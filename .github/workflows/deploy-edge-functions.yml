name: Deploy Supabase Edge Functions

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/functions/**'

  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy all edge functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          # Deploy each function in its own subshell to avoid Deno graph conflicts
          PROJECT_REF="mebzqfeeiciayxdetteb"
          FAILED=()

          deploy_fn() {
            local fn=$1
            echo "→ Deploying $fn..."
            if supabase functions deploy "$fn" \
              --project-ref "$PROJECT_REF" \
              --no-verify-jwt 2>&1; then
              echo "✅ $fn"
            else
              echo "❌ $fn failed"
              FAILED+=("$fn")
            fi
          }

          # Get all function names dynamically from the repo
          for fn_dir in supabase/functions/*/; do
            fn=$(basename "$fn_dir")
            # Skip the _shared helpers directory
            if [[ "$fn" == _* ]]; then
              continue
            fi
            deploy_fn "$fn"
          done

          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          if [ ${#FAILED[@]} -eq 0 ]; then
            echo "✅ All functions deployed successfully"
          else
            echo "❌ Failed functions: ${FAILED[*]}"
            exit 1
          fi
