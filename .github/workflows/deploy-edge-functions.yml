name: Deploy Supabase Edge Functions

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/functions/**'

  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy all edge functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: mebzqfeeiciayxdetteb
        run: |
          supabase functions deploy --project-ref $SUPABASE_PROJECT_ID --no-verify-jwt agent-bonus-qualification
          supabase functions deploy --project-ref $SUPABASE_PROJECT_ID --no-verify-jwt agent-calibrate-templates
          supabase functions deploy --project-ref $SUPABASE_PROJECT_ID --no-verify-jwt agent-call-summarizer
          supabase functions deploy --project-ref $SUPABASE_PROJECT_ID --no-verify-jwt agent-cash-flow
          supabase functions deploy --project-ref $SUPABASE_PROJECT_ID --no-verify-jwt agent-change-order-drafter
          supabase functions deploy --project-ref $SUPABASE_PROJECT_ID --no-verify-jwt agent-compliance-monitor
          supabase functions deploy --project-ref $SUPABASE_PROJECT_ID --no-verify-jwt agent-conversation-transcriber
          supabase functions deploy --project-ref $SUPABASE_PROJECT_ID --no-verify-jwt agent-daily-log
          supabase functions deploy --project-ref $SUPABASE_PROJECT_ID --no-verify-jwt agent-document-classifier
          supabase functions deploy --project-ref $SUPABASE_PROJECT_ID --no-verify-jwt agent-generate-contract
          supabase functions deploy --project-ref $SUPABASE_PROJECT_ID --no-verify-jwt agent-generate-reel
          supabase functions deploy --project-ref $SUPABASE_PROJECT_ID --no-verify-jwt agent-generate-scope
          supabase functions deploy --project-ref $SUPABASE_PROJECT_ID --no-verify-jwt agent-improvement-analysis
          supabase functions deploy --project-ref $SUPABASE_PROJECT_ID --no-verify-jwt agent-inspection-analyzer
          supabase functions deploy --project-ref $SUPABASE_PROJECT_ID --no-verify-jwt agent-invoice-aging
          supabase functions deploy --project-ref $SUPABASE_PROJECT_ID --no-verify-jwt agent-invoice-generator
          supabase functions deploy --project-ref $SUPABASE_PROJECT_ID --no-verify-jwt agent-lead-aging
          supabase functions deploy --project-ref $SUPABASE_PROJECT_ID --no-verify-jwt agent-lead-intake
